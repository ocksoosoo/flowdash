<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo dashboard</title>
    <link rel="stylesheet" href="./cssfolder/reset.css" />
    <link rel="stylesheet" href="./cssfolder/variables.css" />
    <link rel="stylesheet" href="./cssfolder/layout.css" />
    <link rel="stylesheet" href="./cssfolder/components.css" />
    <link rel="stylesheet" href="./cssfolder/theme.css" />
    <link rel="stylesheet" href="./cssfolder/responsive.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="td-container">
      <!-- header -->
      <header class="td-header">
        <section class="td-header__profile">
          <img
            src="assets/imz.webp"
            alt="profile image"
            class="td-header__profile-img"
          />
          <div class="td-header__text-container">
            <div class="td-header__text-box">
              <p class="td-header__text-sub">좋은 아침이에요!</p>
              <h1 class="td-header__text-main">
                <span class="td-header__brand-name">FlowDash</span>님
              </h1>
            </div>
            <span class="td-header__date">2026.07.08.WED</span>
          </div>
        </section>
        <div class="td-header__theme-toggle">
          <!--라이트모드버튼-->
          <button
            type="button"
            class="td-header__toggle-btn td-header__toggle-btn--light td-header__toggle-btn--active"
            aria-label="라이트 모드 전환"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g clip-path="url(#clip0_16_100)">
                <path
                  d="M9 12C10.6569 12 12 10.6569 12 9C12 7.34315 10.6569 6 9 6C7.34315 6 6 7.34315 6 9C6 10.6569 7.34315 12 9 12Z"
                  stroke="black"
                  stroke-linejoin="round"
                />
                <path
                  d="M15 9H15.75M2.25 9H3M9 15V15.75M9 2.25V3M13.2427 13.2427L13.773 13.773M4.227 4.227L4.75725 4.75725M4.75725 13.2427L4.227 13.773M13.773 4.227L13.2427 4.75725"
                  stroke="black"
                  stroke-linecap="round"
                />
              </g>
              <defs>
                <clipPath id="clip0_16_100">
                  <rect width="18" height="18" fill="white" />
                </clipPath>
              </defs>
            </svg>
          </button>
          <!--다크모드버튼-->
          <button
            type="button"
            class="td-header__toggle-btn td-header__toggle-btn--dark"
            aria-label="다크 모드 전환"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
            >
              <g clip-path="url(#clip0_16_106)">
                <path
                  d="M10.3349 13.5272C9.59605 13.8393 8.80208 14.0001 7.99998 14C6.48782 14.0006 5.03122 13.4301 3.9216 12.4028C2.81198 11.3755 2.13119 9.96706 2.01542 8.45934C1.89966 6.95162 2.35746 5.45579 3.29724 4.27112C4.23702 3.08645 5.58946 2.30032 7.08398 2.07001C6.66077 3.00066 6.55488 4.04454 6.7826 5.04122C7.01031 6.0379 7.55902 6.93222 8.3444 7.58675C9.12978 8.24127 10.1084 8.61977 11.1298 8.66408C12.1512 8.70839 13.1589 8.41606 13.998 7.83201C14.0204 8.63379 13.8819 9.43194 13.5906 10.1793C13.2992 10.9266 12.861 11.6079 12.3018 12.183C11.7426 12.758 11.0738 13.2151 10.3349 13.5272Z"
                  stroke="black"
                  stroke-width="0.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </g>
              <defs>
                <clipPath id="clip0_16_106">
                  <rect width="16" height="16" fill="white" />
                </clipPath>
              </defs>
            </svg>
          </button>
        </div>
      </header>
      <!-- main -->
      <main class="td-main">
        <section class="td-list">
          <!--total-->
          <article class="td-list__card td-list__card--total">
            <h2 class="td-list__title">Total Tasks</h2>
            <p class="td-list__count">4</p>
          </article>
          <!--todo-->
          <article class="td-list__card td-list__card--todo">
            <h2 class="td-list__title">To Do</h2>
            <p class="td-list__count">1</p>
          </article>
          <!--achievement-->
          <article class="td-list__card td-list__card--achievement">
            <h2 class="td-list__title">Achievement</h2>
            <div class="td-list__chart-container" id="achievementcircle">
              <span class="td-list__percent">50%</span>
            </div>
          </article>
          <!--progress-->
          <article class="td-list__card td-list__card--progress">
            <h2 class="td-list__title">In progress</h2>
            <p class="td-list__count">2</p>
          </article>
          <!--done-->
          <article class="td-list__card td-list__card--done">
            <h2 class="td-list__title">Done</h2>
            <p class="td-list__count">1</p>
          </article>
        </section>
      </main>
      <!-- footer -->
      <footer class="td-footer"></footer>
    </div>





    <!-- 할 일 추가 modal -->
     <div class="modal-container">
      <h2>새 할 일</h2>

      <!-- 제목 -->
       <div class="modal__field">
         <h3><label for="modal__task-title">제목</label></h3>
         <input type="text" id="modal__task-title" class="modal__title" placeholder="제목을 입력하세요.">
       </div>

       <!-- 내용 -->
       <div class="modal__field">
         <h3><label for="modal__task-content">내용</label></h3>
         <textarea  id="modal__task-content" class="modal__content" placeholder="할 일을 입력하세요."></textarea>
       </div>

        <!-- 우선순위 & 상태 -->
        <div class="modal__priority-status-container">
        <!-- 우선 순위 -->
         <div class="modal__priority-group">
           <h3>우선 순위</h3>
           <div class="priority-container">
            <div class="priority__high">높음</div>
            <div class="priority__medium">중간</div>
            <div class="priority__low">낮음</div>
           </div>
         </div>

         <!-- 상태 -->
         <div class="modal__status-group">
           <h3><label for="modal__task-status">상태</label></h3>
           <select id="modal__task-status" class="modal__status">
             <option value="todo">진행 전</option>
             <option value="in-progress">진행 중</option>
             <option value="done">완료</option>
           </select>
         </div>

        </div> <!-- .priority-status-container -->

        <!-- 버튼 -->
        <div class="button-container">
          <button class="button__cancel">취소</button>
          <button class="button__save">저장</button>
        </div>
        
       </div> <!-- .modal-container -->
  </body>
</html>
