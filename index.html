<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo dashboard</title>
    <link rel="stylesheet" href="./cssfolder/reset.css" />
    <link rel="stylesheet" href="./cssfolder/variables.css" />
    <link rel="stylesheet" href="./cssfolder/layout.css" />
    <link rel="stylesheet" href="./cssfolder/components.css" />
    <link rel="stylesheet" href="./cssfolder/theme.css" />
    <link rel="stylesheet" href="./cssfolder/responsive.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- header -->
    <header class="td-header">
      <div class="td-header__card">
        <section class="td-header__profile">
          <div class="td-header__profile-frame">
            <img
              src="assets/imz.webp"
              alt="profile image"
              class="td-header__profile-img"
            />
          </div>
          <div class="td-header__text-container">
            <div class="td-header__text-box">
              <p class="td-header__text-sub">좋은 아침이에요!</p>
              <h1 class="td-header__text-main">
                <div>
                  <span class="td-header__brand-name">FlowDash</span>
                  <svg xmlns="http://www.w3.org/2000/svg" width="12" height="11" viewBox="0 0 12 11" fill="none" class="pen">
                  <path d="M0.0409472 1.20018C-0.181418 0.490256 0.538403 -0.16534 1.31725 0.0373461L6.56519 1.40391C8.28221 1.85108 9.51324 3.11264 9.51324 4.7916C9.51324 5.04757 9.48 5.29832 9.41925 5.54227C9.39518 5.63891 9.42613 5.71257 9.46682 5.74966L10.8744 7.03265C10.9702 7.11996 11.0462 7.22364 11.0981 7.33774C11.1499 7.45184 11.1766 7.57414 11.1766 7.69765C11.1766 7.82115 11.1499 7.94345 11.0981 8.05755C11.0462 8.17165 10.9702 8.27533 10.8744 8.36264L9.17511 9.91153C9.07931 9.99887 8.96558 10.0682 8.8404 10.1154C8.71522 10.1627 8.58105 10.187 8.44555 10.187C8.31005 10.187 8.17588 10.1627 8.0507 10.1154C7.92551 10.0682 7.81178 9.99887 7.71598 9.91153L6.30614 8.62645C6.26602 8.58936 6.18464 8.56115 6.07862 8.58361C5.80935 8.64082 5.53384 8.67008 5.25736 8.67085C3.41539 8.67085 2.03077 7.54876 1.54077 5.98369L0.0409472 1.20018ZM2.78039 2.53332C2.74045 2.5697 2.70877 2.6129 2.68715 2.66045C2.66553 2.708 2.6544 2.75897 2.6544 2.81044C2.6544 2.86192 2.66553 2.91288 2.68715 2.96043C2.70877 3.00798 2.74045 3.05119 2.78039 3.08757L4.50258 4.65787C4.58361 4.72927 4.69216 4.76881 4.80486 4.76797C4.91756 4.76712 5.02539 4.72596 5.10512 4.65336C5.18486 4.58075 5.23011 4.4825 5.23114 4.37978C5.23218 4.27705 5.1889 4.17806 5.11064 4.10414L3.38789 2.53279C3.30729 2.45942 3.19805 2.41821 3.08414 2.41821C2.97023 2.41821 2.86099 2.45995 2.78039 2.53332Z" fill="currentColor"/>
                  </svg><span>님</span>
                </div>
              </h1>
            </div>
            <span class="td-header__date">2026.07.08.WED</span>
          </div>
        </section>
        <div class="td-header__theme-toggle">
          <!--라이트모드버튼-->
          <button
            type="button"
            class="td-header__toggle-btn"
            aria-label="테마 모드 전환"
          >
            <svg
              class="td-header__lighttheme-btn"
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g clip-path="url(#clip0_16_100)">
                <path
                  d="M9 12C10.6569 12 12 10.6569 12 9C12 7.34315 10.6569 6 9 6C7.34315 6 6 7.34315 6 9C6 10.6569 7.34315 12 9 12Z"
                  stroke="black"
                  stroke-linejoin="round"
                />
                <path
                  d="M15 9H15.75M2.25 9H3M9 15V15.75M9 2.25V3M13.2427 13.2427L13.773 13.773M4.227 4.227L4.75725 4.75725M4.75725 13.2427L4.227 13.773M13.773 4.227L13.2427 4.75725"
                  stroke="black"
                  stroke-linecap="round"
                />
              </g>
              <defs>
                <clipPath id="clip0_16_100">
                  <rect width="18" height="18" fill="white" />
                </clipPath>
              </defs>
            </svg>
            <svg class="td-header__darktheme-btn"
              xmlns="http://www.w3.org/2000/svg"
              width="23"
              height="23"
              viewBox="0 0 23 23"
              fill="none">
              <g clip-path="url(#clip0_291_110)">
              <path d="M11.5002 20.125C9.25454 20.1246 7.09758 19.2482 5.48788 17.6824C3.87818 16.1165 2.94269 13.9845 2.88029 11.7397C2.81788 9.49485 3.63348 7.31421 5.1537 5.66131C6.67392 4.00842 8.77887 3.01363 11.0211 2.88842V2.875C10.6818 3.80075 10.5419 4.70637 10.5419 5.75C10.5419 8.03749 11.4506 10.2313 13.0681 11.8488C14.6856 13.4663 16.8794 14.375 19.1669 14.375C19.3959 14.375 19.4103 14.3922 19.6346 14.375C19.0399 16.057 17.9382 17.5132 16.4814 18.543C15.0246 19.5728 13.2843 20.1255 11.5002 20.125Z"
              stroke="black"
              stroke-linecap="round"
              stroke-linejoin="round"/>
              </g>
              <defs>
              <clipPath id="clip0_291_110">
              <rect width="23" height="23" fill="white"/>
              </clipPath>
              </defs>
          </svg>          
        </button>
          <!-- 다크모드버튼 -->
        </div>
      </div>
      <div class="td-header__card-bg"></div>
    </header>
    <!-- main -->
    <main class="td-main">
      <section class="td-list">
        <!--total-->
        <article
          class="td-list__card td-list__card--total td-list__card--hoverable"
        >
          <h2 class="td-list__title">Total Tasks</h2>
          <p class="td-list__count">4</p>
        </article>
        <!--todo-->
        <article
          class="td-list__card td-list__card--todo td-list__card--hoverable"
        >
          <h2 class="td-list__title">To Do</h2>
          <p class="td-list__count">1</p>
        </article>
        <!--achievement-->
        <article class="td-list__card td-list__card--achievement">
          <h2 class="td-list__title">Achievement</h2>
          <span class="td-list__percent" id="achievement-percent">50%</span>
          <div class="td-list__chart-container" id="achievementcircle">
            <div class="wave"></div>
            <div class="wave layer_1"></div>
          </div>
        </article>
        <!--progress-->
        <article
          class="td-list__card td-list__card--progress td-list__card--hoverable"
        >
          <h2 class="td-list__title">In progress</h2>
          <p class="td-list__count">2</p>
        </article>
        <!--done-->
        <article
          class="td-list__card td-list__card--done td-list__card--hoverable"
        >
          <h2 class="td-list__title">Done</h2>
          <p class="td-list__count">1</p>
        </article>
      </section>
      <!-- controls-->
      <section class="td-controls">
        <!--left-->
        <div class="td-controls__group td-controls__group--left">
          <div class="td-controls__search-box"> 
            <!--search box-->
            <input
              type="text"
              class="td-controls__search-input"
              placeholder="search..."
            />
            <button type="button" class="td-controls__search-btn" aria-label="검색">
              <svg
                width="15"
                height="15"
                viewBox="0 0 15 15"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M10.4167 9.16667H9.75834L9.525 8.94167C10.37 7.96173 10.8343 6.71059 10.8333 5.41667C10.8333 4.34535 10.5157 3.2981 9.92046 2.40733C9.32527 1.51656 8.4793 0.822296 7.48954 0.412322C6.49977 0.00234696 5.41066 -0.104921 4.35993 0.104082C3.3092 0.313085 2.34404 0.828973 1.58651 1.58651C0.828973 2.34404 0.313085 3.3092 0.104082 4.35993C-0.104921 5.41066 0.00234696 6.49977 0.412322 7.48954C0.822296 8.4793 1.51656 9.32527 2.40733 9.92046C3.2981 10.5157 4.34535 10.8333 5.41667 10.8333C6.75834 10.8333 7.99167 10.3417 8.94167 9.525L9.16667 9.75834V10.4167L13.3333 14.575L14.575 13.3333L10.4167 9.16667ZM5.41667 9.16667C3.34167 9.16667 1.66667 7.49167 1.66667 5.41667C1.66667 3.34167 3.34167 1.66667 5.41667 1.66667C7.49167 1.66667 9.16667 3.34167 9.16667 5.41667C9.16667 7.49167 7.49167 9.16667 5.41667 9.16667Z"
                  fill="#443434"
                />
              </svg>
            </button>
          </div>
          <!--priority-->
          <div class="td-controls__filter-inline">
            <select class="td-controls__select">
              <option value="all">전체 기간</option>
              <option value="today">오늘</option>
              <option value="week">최근 7일</option>
            </select>
            <!--left-->
            <select class="td-controls__select">
              <option value="all">전체 우선순위</option>
              <option value="low">낮음</option>
              <option value="mid">중간</option>
              <option value="high">높음</option>
            </select>
            <!--align-->
            <select class="td-controls__select">
              <option value="asc">정렬: 오름차순</option>
              <option value="desc">정렬: 내림차순</option>
            </select>
          </div>
        </div>
          <!--right-->
          <div class="td-controls__group td-controls__group--right">
            <!--work add btn-->
            <button type="button" class="td-controls__btn td-controls__btn--add">
              + 새 할 일
            </button>
          </div>
          <!--reset btn-->
      </section>
      <!-- tag -->
      <div class="td-tags">
        <div class="td-tags__container" id="activeTagsContainer">
          <span class="td-tags__item"> 정렬: 오름차순 </span>
        </div>
        <button
          type="button"
          class="td-controls__btn td-controls__btn--reset"
        >
          전체 초기화 
        </button>
      </div>
      <!-- todo board -->
      <section class="td-board">
        <!--할 일 head-->
        <article class="td-board__section">
          <div class="td-board__header">
            <h3 class="td-board__title">할 일</h3>
            <span class="td-board__count td-board__count--todo" id="todo-count">0</span>
          </div>
          <ul class="td-board__list" id="todo-list">
            
            
          </ul>
        </article>
        <!--진행중 head-->
        <article class="td-board__section">
          <div class="td-board__header">
            <h3 class="td-board__title">진행중</h3>
            <span class="td-board__count td-board__count--progress" id="doing-count">0</span>
          </div>
          <ul class="td-board__list" id="doing-list">
            <!--예외처리-->
            
          </ul>
        </article>
        <!--완료 head-->
        <article class="td-board__section">
          <div class="td-board__header">
            <h3 class="td-board__title">완료</h3>
            <span class="td-board__count td-board__count--done" id="done-count">0</span>
          </div>
          <ul class="td-board__list" id="done-list">
            <!--예외처리-->
            
          </ul>
        </article>
      </section>
    </main>
    <!-- footer -->
    <footer class="td-footer">
      <p class="td-footer__copyright">
        &copy;2026 FlowDash. All rights reserved.
      </p>
    </footer>

    <!--div추가-->
    <div class="modal-overlay modal-overlay--task" hidden>
      <!-- 할 일 추가 modal -->
      <div class="modal-container">
        <h2>새 할 일</h2>

        <!-- 제목 -->
        <div class="modal__field">
          <h3><label for="modal__task-title">제목</label></h3>
          <input
            type="text"
            id="modal__task-title"
            class="modal__title"
            placeholder="제목을 입력하세요."
          />
        </div>

        <!-- 내용 -->
        <div class="modal__field">
          <h3><label for="modal__task-content">내용</label></h3>
          <textarea
            id="modal__task-content"
            class="modal__content"
            placeholder="할 일을 입력하세요."
          ></textarea>
        </div>

        <!-- 우선순위 & 상태 -->
        <div class="modal__priority-status-container">
          <!-- 우선 순위 -->
          <div class="modal__priority-group">
            <h3>우선 순위</h3>
            <div class="priority-container">
              <button type="button" class="priority__mid">중간</button>
              <button type="button" class="priority__low">낮음</button>
              <button type="button" class="priority__high">높음</button>
            </div>
          </div>

          <!-- 상태 -->
          <div class="modal__status-group">
            <h3><label for="modal__task-status">상태</label></h3>
            <select id="modal__task-status" class="modal__status">
              <option value="todo">진행 전</option>
              <option value="in-progress">진행 중</option>
              <option value="done">완료</option>
            </select>
          </div>
        </div>
        <!-- .priority-status-container -->

        <!-- 버튼 -->
        <div class="button-container">
          <button class="button__cancel">취소</button>
          <button class="button__save">저장</button>
        </div>
      </div>
      <!-- .modal-container -->
    </div>
    <!--div 추가-->
    <div class="modal-overlay modal-overlay--reset" hidden>
      <!-- reset modal -->
      <div class="reset-modal-container">
        <p class="reset-modal__message">
          <span>정말 삭제하시겠습니까?</span>
          <br />
          <span>초기화 후엔 되돌릴 수 없습니다.</span>
        </p>

        <div class="reset-modal-btn-container">
          <button class="reset-modal-btn__cancel">취소</button>
          <button class="reset-modal-btn__delete">삭제</button>
        </div>
      </div>
    </div>
    <!-- .reset-modal-container -->
    <!--플로팅 버튼-->
    <button type="button" id="scrollTopBtn" class="td-scroll-btn">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        fill="currentColor"
        class="bi bi-arrow-up-short"
        viewBox="0 0 16 16"
      >
        <path
          fill-rule="evenodd"
          d="M8 12a.5.5 0 0 0 .5-.5V5.707l2.146 2.147a.5.5 0 0 0 .708-.708l-3-3a.5.5 0 0 0-.708 0l-3 3a.5.5 0 1 0 .708.708L7.5 5.707V11.5a.5.5 0 0 0 .5.5"
        />
      </svg>
    </button>
    <script type="module" src="./jsfolder/main.js"></script>
  </body>
</html>
